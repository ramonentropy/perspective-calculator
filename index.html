<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Perspective Calculator v0.19b — Entropy Studio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080d;--panel:#0b1018;--panel-border:#192436;--surface-hi:#111a28;
  --text:#c4d0e0;--text-muted:#5c7e9a;
  --a:#bf3830;--a-soft:rgba(191,56,48,0.09);--a-mid:rgba(191,56,48,0.20);
  --b:#1e70b8;--b-soft:rgba(30,112,184,0.09);--b-mid:rgba(30,112,184,0.20);
  --out:#9a8440;--warn-clr:#a07830;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
html{height:100%;height:-webkit-fill-available}
body{height:100%;min-height:-webkit-fill-available;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:12px;overflow:hidden}
body{display:flex;flex-direction:column}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:center;
  padding:0;height:52px;
  background:#08101a;border-bottom:2px solid var(--a);
  flex-shrink:0;
}
.topbar-inner{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:0 24px;
}
.logo-slot img{height:34px;width:auto;display:block}
.topbar .brand{font-family:var(--mono);font-size:13px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text);flex:1}
.topbar .brand span{color:var(--text-muted)}
.btn-layout{
  background:var(--surface-hi);border:1px solid var(--panel-border);color:var(--text-muted);
  font-family:var(--mono);font-size:9px;letter-spacing:0.08em;text-transform:uppercase;
  padding:6px 10px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:5px;
}
.btn-layout:hover{color:var(--text);border-color:var(--text-muted)}
.btn-layout svg{flex-shrink:0}
.btn-report{
  background:var(--a);border:none;color:#fff;font-family:var(--mono);
  font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  padding:7px 14px;border-radius:3px;cursor:pointer;
}
.btn-report:hover{background:#d44038}

/* INFOBAR */
.infobar{
  display:flex;justify-content:center;
  background:#060a10;border-bottom:2px solid var(--panel-border);
  flex-shrink:0;padding:6px 0;
}
.infobar-inner{
  display:flex;width:calc(100% - 48px);margin:0 24px;
  border:1px solid var(--panel-border);border-radius:5px;overflow:hidden;
}
.infobar label{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-right:1px solid var(--panel-border);
  font-family:var(--mono);font-size:9px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:0.1em;flex:1;
  background:#080e18;
}
.infobar label:last-child{border-right:none}
.infobar input{
  background:none;border:none;outline:none;color:var(--text);
  font-family:var(--mono);font-size:10px;flex:1;min-width:0;
}
.infobar input::placeholder{color:var(--text-muted);opacity:0.4}

/* MAIN GRID */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 1fr;
  width:100%;
  flex:1;min-height:0;overflow:hidden;
  padding:14px 12px;gap:12px;
}

/* PANELS */
.panel-a,.panel-b{
  overflow-y:auto;overflow-x:hidden;
  padding:0 0 12px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:6px;
  min-width:220px;
}
.panel-a .field,.panel-b .field,
.panel-a .cam-height-field,.panel-b .cam-height-field,
.panel-a .adv-wrap,.panel-b .adv-wrap{
  padding-left:16px;padding-right:16px;
}
.viewer{
  overflow-y:auto;overflow-x:hidden;position:relative;
  background:#07090f;display:flex;flex-direction:column;gap:10px;padding:12px;
  border:1px solid var(--panel-border);border-radius:6px;min-width:0;
}
.side-panel{
  background:#080e18;
  border:1px solid var(--panel-border);
  border-radius:6px;
  padding:0;
  flex-shrink:0;height:300px;overflow:hidden;
  width:calc(100% - 24px);
  margin:0 auto 14px;
}
#side-svg{width:100%;height:100%;display:block}

/* PANEL HEADERS */
.panel-a h2,.panel-b h2{
  padding:9px 16px;
  background:#0a1520;
  border-bottom:1px solid var(--panel-border);
  border-radius:6px 6px 0 0;
  font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.12em;
  display:flex;align-items:center;gap:7px;
  position:sticky;top:0;z-index:2;
  margin:0 0 8px;
}
.panel-a h2{color:var(--a)}
.panel-b h2{color:var(--b)}
.panel-a h2::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--a);flex-shrink:0}
.panel-b h2::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--b);flex-shrink:0}

/* SECTION HEADERS */
.sec-hdr{
  background:#0f1e2e;border-top:1px solid var(--panel-border);border-bottom:1px solid var(--panel-border);
  font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text);
  padding:7px 16px 7px 13px;margin:6px 0 12px;
}
.panel-a .sec-hdr{border-left:3px solid var(--a)}
.panel-b .sec-hdr{border-left:3px solid var(--b)}
.sec-hdr--derived{opacity:0.45;margin-top:16px}

/* COMPACT / MOBILE LAYOUT */
body.layout-compact .main{
  grid-template-columns:1fr;
  padding:10px 16px;
}
body.layout-compact .panel-b{display:none}
body.layout-compact .viewer{min-height:300px}
body.layout-compact .side-panel{margin:0 16px 10px}

/* FIELDS */
.field{margin-bottom:10px}
.field-head{display:flex;align-items:center;gap:4px;margin-bottom:0}
.field-head label{
  font-family:var(--mono);font-size:9px;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--text-muted);flex:1;
}
.fv{display:flex;align-items:center;gap:2px}
.fv input[type=number]{
  background:var(--surface-hi);border:1px solid var(--panel-border);
  color:var(--text);font-family:var(--mono);font-size:11px;
  width:58px;padding:2px 4px;border-radius:3px;text-align:right;
  -moz-appearance:textfield;
}
.fv input[type=number]::-webkit-inner-spin-button,.fv input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.fv .unit{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-left:2px;margin-right:2px}

/* SLIDERS */
.slider-wrap{position:relative;padding-bottom:6px}
.slider-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background:repeating-linear-gradient(to right,var(--panel-border) 0,var(--panel-border) 1px,transparent 1px,transparent 10%);
  pointer-events:none;
}
input[type=range]{
  display:block;width:100%;height:2px;border-radius:1px;
  background:var(--panel-border);-webkit-appearance:none;appearance:none;
  cursor:pointer;outline:none;margin-top:6px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--text);cursor:pointer;
}
input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--text);cursor:pointer;border:none;
}

/* LOCK & CHAIN BUTTONS */
.lock-btn,.reset-btn{
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  padding:2px;display:flex;align-items:center;justify-content:center;
  width:18px;height:18px;flex-shrink:0;
}
.lock-btn.locked{color:var(--out)}
.reset-btn:hover{color:var(--text)}
.chain-btn{
  background:none;border:none;cursor:pointer;color:var(--b);
  padding:2px;display:flex;align-items:center;width:18px;height:18px;
}
.chain-btn.broken{color:var(--text-muted)}

/* PILLS */
.pill{display:flex;background:var(--bg);border:1px solid var(--panel-border);border-radius:5px;padding:2px;gap:2px}
.pill button{
  background:transparent;border:none;color:var(--text-muted);
  font-size:9px;padding:5px 10px;border-radius:3px;cursor:pointer;
  font-family:var(--mono);letter-spacing:0.07em;text-transform:uppercase;
}
.pill button.active{background:var(--surface-hi);color:var(--text)}

/* ADVANCED SECTION */
.adv-wrap{padding-top:4px;padding-bottom:4px}
.adv-fields{display:none;flex-direction:column;gap:6px;padding-top:8px}
.adv-fields.visible{display:flex}
.adv-row{display:flex;flex-direction:column;gap:2px}
.adv-row label{font-family:var(--mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
.adv-row select,.adv-row input[type=number]{
  background:var(--surface-hi);border:1px solid var(--panel-border);
  color:var(--text);font-family:var(--mono);font-size:10px;
  padding:3px 6px;border-radius:3px;width:100%;
}
.adv-row select{cursor:pointer}

/* WARNING */
.warn-txt{
  font-family:var(--mono);font-size:9px;color:var(--warn-clr);
  padding:4px 0;display:none;
}
.warn-txt.visible{display:block}

/* VIEWER CONTROLS */
.viewer-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.viewer-ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl-label{font-family:var(--mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}

/* MIX OPACITY */
.mix-ctrl{display:flex;align-items:center;gap:8px;flex:1}
.mix-ctrl input[type=range]{margin-top:0}

/* CANVAS AREA */
.canvas-area{
  flex:1;position:relative;min-height:0;overflow:hidden;
  background:#04060b;border-radius:4px;border:1px solid var(--panel-border);
  display:flex;
}
#graf-svg{flex:1;width:100%;height:100%;display:block;min-height:0}
.three-wrap{width:100%;height:100%;display:flex;gap:0;overflow:hidden}
.three-wrap canvas{flex:1;display:block}
.wipe-container{width:100%;height:100%;position:relative;overflow:hidden}
.wipe-overlay{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none}
.wipe-divider{
  position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.4);
  cursor:ew-resize;z-index:10;pointer-events:all;
}
.wipe-divider::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.7);
}

/* SIDE PANEL — SVG fills box, label rendered inside SVG */

/* SCROLLBARS */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:2px}

/* CAMERA HEIGHT FIELD */
.cam-height-field{margin-bottom:6px}

/* FOV DISPLAY */
.fov-display{
  font-family:var(--mono);font-size:9px;color:var(--text-muted);
  padding:4px 0;
}
.fov-display span{color:var(--text)}

/* MOBILE TOGGLE STUB */
.view-toggle-wrap{margin-left:auto}

/* LIGHT MODE */
body.light-mode{
  --bg:#edf2f7;--panel:#f8fafc;--panel-border:#c2cdd9;--surface-hi:#dde8f2;
  --text:#1a2a3a;--text-muted:#4a6478;
}
body.light-mode .topbar{background:#dde8f4;border-bottom-color:#b0c4d8}
body.light-mode .infobar{background:#e5eef5!important;border-bottom-color:#c2cdd9!important}
body.light-mode .infobar label{background:#e5eef5}
body.light-mode input[type=number],body.light-mode input[type=text],body.light-mode select{
  background:#dde8f2;color:#1a2a3a;border-color:#b8ccde
}
body.light-mode .computed{color:#8a6820!important}
body.light-mode .pill{background:#d4e2ee}
body.light-mode .pill button.active{background:#c8d8e8;color:#1a2a3a}
body.light-mode .canvas-area{background:#d0dcea}
body.light-mode .sec-hdr{background:#d0dcea;color:#1a2a3a}
body.light-mode .viewer{background:#dde8f2}
body.light-mode .side-panel{background:#dde8f2;border-color:#c2cdd9}
body.light-mode .panel-a h2,body.light-mode .panel-b h2{background:#dde8f2}
body.light-mode .fov-display{color:#4a6478}
body.light-mode .fov-display span{color:#1a2a3a}
body.light-mode .infobar input{background:transparent!important;border:none!important;color:#1a2a3a!important}
body.light-mode #side-svg{background:#dde8f2}

/* CAMERA WARNING OVERLAY */
.cam-warning{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  pointer-events:none;z-index:20;
}
.cam-warning-box{
  background:rgba(140,100,30,0.88);color:#fff;border-radius:5px;
  padding:7px 14px;font-size:10px;font-family:var(--mono);letter-spacing:0.04em;
  text-align:center;backdrop-filter:blur(4px);border:1px solid rgba(255,200,100,0.3);
  white-space:nowrap;
}

/* THEME TOGGLE BUTTON */
.btn-theme{
  background:var(--surface-hi);border:1px solid var(--panel-border);color:var(--text-muted);
  font-size:13px;border-radius:4px;padding:3px 8px;cursor:pointer;line-height:1;
}
.btn-theme:hover{color:var(--text);border-color:var(--text-muted)}

/* IMPORT/EXPORT BUTTONS */
.btn-io{
  background:var(--surface-hi);border:1px solid var(--panel-border);color:var(--text-muted);
  font-family:var(--mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;
  border-radius:4px;padding:3px 8px;cursor:pointer;
}
.btn-io:hover{color:var(--text);border-color:var(--text-muted)}

/* RESET ALL BUTTON */
.btn-reset-all{
  background:var(--surface-hi);border:1px solid var(--panel-border);color:var(--text-muted);
  font-family:var(--mono);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;
  border-radius:4px;padding:3px 8px;cursor:pointer;
}
.btn-reset-all:hover{color:var(--a);border-color:var(--a)}

/* OPACITY RESET ICON */
.opacity-reset{
  background:none;border:none;cursor:pointer;color:var(--text-muted);
  font-size:12px;padding:0 2px;line-height:1;
}
.opacity-reset:hover{color:var(--text)}

/* MOBILE TABS */
.mobile-tabs{display:none}

/* Compact layout driven by JS class only — no media query !important conflicts */
body.layout-compact .topbar{height:auto;min-height:52px}
body.layout-compact .topbar-inner{flex-wrap:wrap;gap:4px;padding:6px 10px}
body.layout-compact .brand{font-size:11px}
body.layout-compact .btn-io,
body.layout-compact .btn-reset-all,
body.layout-compact .btn-theme{font-size:9px;padding:3px 6px}
body.layout-compact .infobar-inner{flex-wrap:wrap;overflow:visible;height:auto}
body.layout-compact .infobar label{flex:1 1 45%;min-width:0}
body.layout-compact{height:auto;min-height:100%;overflow-x:hidden;overflow-y:auto}
body.layout-compact .main{display:flex;flex-direction:column;flex:none;min-height:0;overflow:visible;padding:8px;gap:10px;width:100%}
body.layout-compact .panel-a{order:1}
body.layout-compact .panel-b{order:2}
body.layout-compact .viewer{order:3}
body.layout-compact .panel-a,
body.layout-compact .panel-b{display:block;overflow-y:visible;overflow-x:hidden;width:100%;min-width:0;border-radius:6px}
body.layout-compact .viewer{display:flex;flex-direction:column;width:100%;min-height:55vw;max-height:85vw;flex:none;border-radius:6px}
body.layout-compact .side-panel{width:100%;min-height:220px;margin:0;border-radius:6px;border-left:1px solid var(--panel-border);border-right:1px solid var(--panel-border);border-top:1px solid var(--panel-border)}

/* PRINT / REPORT */
@media print{body{overflow:visible}}
</style>
</head>

};

// ─── MATH HELPERS ─────────────────────────────────────────────────────────────
const DEG = Math.PI / 180;
function rad(d){ return d * DEG; }
function deg(r){ return r / DEG; }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

// Regla: el campo bloqueado no se mueve, el cambiado se queda, el tercero primario compensa.
// Primarios: tilt, objectHeight, slantDist.  Derivados: heightDiff = objH-camH, linearDist.
function solveGeo(p, changedField) {
  const camH = p.cameraHeight;
  let t  = p.tilt;
  let objH = p.objectHeight;
  let sd = p.slantDist;

  const tiltLk = p.locked.has('tilt');
  const objHLk = p.locked.has('objH');
  const sdLk   = p.locked.has('sd');

  let hd = Math.max(0, objH - camH);

  if (changedField === 'tilt') {
    if (sdLk) {
      // sd bloqueado: objH compensa
      hd   = sd * Math.sin(rad(t));
      objH = camH + hd;
    } else {
      // objH bloqueado o default (sin locks): sd compensa, el objeto no se mueve
      const sinT = Math.sin(rad(t));
      sd = sinT > 1e-9 ? hd / sinT : sd;
    }
  } else if (changedField === 'objH' || changedField === 'hd') {
    hd = Math.max(0, objH - camH);
    if (tiltLk) {
      // tilt fijo: sd compensa
      const sinT = Math.sin(rad(t));
      sd = sinT > 1e-9 ? hd / sinT : sd;
    } else {
      // sd fijo (o default): tilt compensa
      const ld = Math.sqrt(Math.max(0, sd*sd - hd*hd));
      t = deg(Math.atan2(hd, ld));
    }
  } else if (changedField === 'sd') {
    if (tiltLk) {
      // tilt fijo: objH compensa
      hd  = sd * Math.sin(rad(t));
      objH = camH + hd;
    } else {
      // objH fijo (o default): tilt compensa
      const ld = Math.sqrt(Math.max(0, sd*sd - hd*hd));
      t = deg(Math.atan2(hd, ld));
    }
  } else if (changedField === 'ld') {
    const ld = p.linearDist;
    if (tiltLk) {
      // tilt fijo: sd y hd se derivan de tilt+ld; objH o camH compensan
      const cosT = Math.cos(rad(t));
      hd  = ld * Math.tan(rad(t));
      sd  = cosT > 1e-9 ? ld / cosT : sd;
      if (objHLk) { p.cameraHeight = Math.max(0, objH - hd); }
      else         { objH = p.cameraHeight + hd; }
    } else if (sdLk) {
      // sd fijo: hd y tilt se derivan de sd+ld; objH o camH compensan
      const v = sd*sd - ld*ld;
      hd = v > 0 ? Math.sqrt(v) : 0;
      t  = deg(Math.atan2(hd, ld));
      if (objHLk) { p.cameraHeight = Math.max(0, objH - hd); }
      else         { objH = p.cameraHeight + hd; }
    } else {
      // default: hd fijo (objH-camH no cambia), tilt y sd se ajustan
      sd = Math.sqrt(hd*hd + ld*ld);
      t  = deg(Math.atan2(hd, ld));
    }
  }

  // Derivados siempre calculados al final (usa p.cameraHeight por si cambió en ld-tiltLk)
  hd = Math.max(0, objH - p.cameraHeight);
  const ld = Math.sqrt(Math.max(0, sd*sd - hd*hd));

  // Límites físicos únicamente — el slider se pina visualmente al tope pero el valor numérico sigue creciendo
  p.tilt         = clamp(isNaN(t)   ? 0 : t,    0,  89.9);
  p.objectHeight = Math.max(0, isNaN(objH) ? 0 : objH);
  p.slantDist    = Math.max(0, isNaN(sd)   ? 0 : sd);
  p.heightDiff   = Math.max(0, isNaN(hd)   ? 0 : hd);
  p.linearDist   = Math.max(0, isNaN(ld)   ? 0 : ld);
}

function updatePlateUI(side) {

  setNum(`${s}-objH-num`, p.objectHeight, 2); setRng(`${s}-objH-rng`, p.objectHeight);
  setNum(`${s}-hd-num`,   p.heightDiff, 2);   setRng(`${s}-hd-rng`, p.heightDiff);
  setNum(`${s}-ld-num`,   p.linearDist, 2);   setRng(`${s}-ld-rng`, p.linearDist);
  setNum(`${s}-sd-num`,   p.slantDist, 2);    setRng(`${s}-sd-rng`, p.slantDist);

  // Lock buttons
  ['tilt','objH','hd','ld','sd'].forEach(f => {

  });

    if (warn) warn.classList.toggle('visible', !p.tiltLinked);

    if (advChain) advChain.classList.toggle('broken', !p.advLinked);
  }

  updateFOV(s);
}

function updateFOV(side) {
  const p = state[side];
  const fovEl = document.getElementById(`${side}-fov`);
  if (!fovEl) return;
  const spans = fovEl.querySelectorAll('span');
  if (p.modelIdx >= 0 && p.modeIdx >= 0 && p.lens > 0) {
    const model = getCamModel(side);
    if (model && model.modes[p.modeIdx]) {
      const mode = model.modes[p.modeIdx];
      const hfov = 2 * deg(Math.atan(mode.sw / (2 * p.lens)));
      const vfov = 2 * deg(Math.atan(mode.sh / (2 * p.lens)));
      spans[0].textContent = hfov.toFixed(1) + '°';
      spans[1].textContent = vfov.toFixed(1) + '°';
      return;
    }
  }
  spans[0].textContent = '—';
  spans[1].textContent = '—';
}

function getCamModel(side) {
  const p = state[side];
  if (p.modelIdx < 0) return null;
  const filtered = CAM_DB.filter(c => c.cat === p.cat && c.make === p.make);
  return filtered[p.modelIdx] || null;
}

// ─── CONSTRAINT HANDLER ───────────────────────────────────────────────────────
function onFieldChange(side, field, value, source) {
  const p = state[side];
  const prevTilt = p.tilt;

  if (field === 'camH') {
    // sd y objH quedan fijos; hd y ld se recalculan; tilt se deriva de la nueva geometría.
    p.cameraHeight = clamp(parseFloat(value)||0, 0, 3);
    const newHd = Math.max(0, p.objectHeight - p.cameraHeight);
    p.heightDiff = newHd;
    p.linearDist = Math.sqrt(Math.max(0, p.slantDist * p.slantDist - newHd * newHd));
    p.tilt = p.linearDist > 0.001 ? deg(Math.atan2(p.heightDiff, p.linearDist))
                                   : (p.heightDiff > 0 ? 90 : 0);
  } else if (field === 'tilt') {
    p.tilt = clamp(parseFloat(value)||0, 0, 90);
    solveGeo(p, 'tilt');
  } else if (field === 'objH') {
    p.objectHeight = Math.max(0, parseFloat(value)||0);
    p.heightDiff = Math.max(0, p.objectHeight - p.cameraHeight);
    solveGeo(p, 'objH');
  } else if (field === 'hd') {
    p.heightDiff = Math.max(0, parseFloat(value)||0);
    if (p.locked.has('objH')) {
      p.cameraHeight = Math.max(0, p.objectHeight - p.heightDiff);
    } else {
      p.objectHeight = p.cameraHeight + p.heightDiff;
    }
    solveGeo(p, 'hd');
  } else if (field === 'ld') {
    p.linearDist = Math.max(0, parseFloat(value)||0);
    solveGeo(p, 'ld');
  } else if (field === 'sd') {
    p.slantDist = Math.max(0, parseFloat(value)||0);
    solveGeo(p, 'sd');
  }

  // Tilt chain: dispara cuando el tilt de plate A cambia (directo o derivado de camH/objH/sd).
  if (side === 'a' && state.b.tiltLinked && state.a.tilt !== prevTilt) {
    state.b.tilt = state.a.tilt;
    solveGeo(state.b, 'tilt');
    updatePlateUI('b');
  }

  updatePlateUI(side);
  render();
}

function resetField(side, field) {
  const def = FIELD_DEFAULTS[side][field];
  if (def !== undefined) onFieldChange(side, field, def, 'reset');
}

const PRIMARY_FIELDS = new Set(['tilt', 'objH', 'sd']);

function toggleLock(side, field) {
  const p = state[side];
  if (p.locked.has(field)) {
    p.locked.delete(field);
  } else {
    if (PRIMARY_FIELDS.has(field)) {
      const lockedPrimary = [...p.locked].find(f => PRIMARY_FIELDS.has(f));
      if (lockedPrimary) {
        showLockWarning(side, field);
        updatePlateUI(side);
        return;
      }
    }
    p.locked.add(field);
  }
  updatePlateUI(side);
  render();
}

function showLockWarning(side, field) {
  const id = `${side}-lock-warn`;
  let el = document.getElementById(id);
  if (!el) {
    el = document.createElement('div');
    el.id = id;
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a1a1a;border:1px solid #e2594c;color:#e2594c;font-size:11px;padding:6px 14px;border-radius:6px;z-index:9999;pointer-events:none;font-family:ui-monospace,monospace;transition:opacity 0.3s';
    document.body.appendChild(el);
  }
  el.textContent = 'Solo se puede bloquear un campo primario a la vez';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function toggleTiltChain() {
  state.b.tiltLinked = !state.b.tiltLinked;
  if (state.b.tiltLinked) {
    state.b.tilt = state.a.tilt;

    updatePlateUI('b');

  const btn = document.getElementById('b-tilt-chain');

  render();
}

function rebuildAdvancedUI(side) {
  const p = state[side];
  const advBtn    = document.getElementById(`${side}-adv-btn`);
  const advFields = document.getElementById(`${side}-adv-fields`);
  if (advBtn)    advBtn.classList.toggle('active', p.advancedMode);
  if (advFields) advFields.classList.toggle('visible', p.advancedMode);

  const catEl = document.getElementById(`${side}-cat`);
  if (catEl) catEl.value = p.cat;

  const makeEl = document.getElementById(`${side}-make`);
  if (makeEl) {
    const filtered = p.cat ? CAM_DB.filter(c => c.cat === p.cat) : CAM_DB;
    const makes = [...new Set(filtered.map(c => c.make))];
    makeEl.innerHTML = '<option value="">— Any —</option>';
    makes.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; makeEl.appendChild(o); });
    makeEl.value = p.make;
  }

  const modelEl = document.getElementById(`${side}-model`);
  if (modelEl) {
    let fm = CAM_DB;
    if (p.cat)  fm = fm.filter(c => c.cat === p.cat);
    if (p.make) fm = fm.filter(c => c.make === p.make);
    modelEl.innerHTML = '<option value="-1">— Select —</option>';
    fm.forEach((c, i) => { const o = document.createElement('option'); o.value = i; o.textContent = c.name; modelEl.appendChild(o); });
    modelEl.value = p.modelIdx;
  }

  const modeEl = document.getElementById(`${side}-mode`);
  if (modeEl) {
    modeEl.innerHTML = '<option value="-1">— Select —</option>';
    if (p.modelIdx >= 0) {
      const model = getCamModel(side);
      if (model) model.modes.forEach((m, i) => { const o = document.createElement('option'); o.value = i; o.textContent = (m.w && m.h) ? `${m.n} — ${m.w}×${m.h}` : m.n; modeEl.appendChild(o); });
    }
    modeEl.value = p.modeIdx;
  }

  const lensNum = document.getElementById(`${side}-lens`);
  const lensRng = document.getElementById(`${side}-lens-rng`);
  if (lensNum) lensNum.value = p.lens;
  if (lensRng) lensRng.value = Math.min(Math.max(p.lens, 12), 300);

  const arEl = document.getElementById(`${side}-ar`);
  if (arEl) arEl.value = p.ar.toFixed(2);

  updateFOV(side);
}

}

function importState(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version || data.version < 15) { alert('Incompatible file version — requires v0.15b or later'); return; }
      ['matchMode','viewMode','compareMode','framing','lockedPlate','mixOpacity'].forEach(k => {
        if (data[k] !== undefined) state[k] = data[k];
      });
      ['a','b'].forEach(s => {
        const src = data[s], dst = state[s];
        if (!src) return;
        ['cameraHeight','tilt','objectHeight','heightDiff','linearDist','slantDist',
         'cat','make','modelIdx','modeIdx','lens','ar','advancedMode'].forEach(k => {
          if (src[k] !== undefined) dst[k] = src[k];
        });
        if (Array.isArray(src.locked)) dst.locked = new Set(src.locked);
        if (s === 'b') {
          if (src.tiltLinked !== undefined) dst.tiltLinked = src.tiltLinked;
          if (src.advLinked  !== undefined) dst.advLinked  = src.advLinked;
        }
      });
      if (data.meta) {
        ['client','project','shot','supervisor'].forEach((k,i) => {
          const id = ['ib-client','ib-project','ib-shot','ib-supervisor'][i];
          const el = document.getElementById(id);
          if (el && data.meta[k] !== undefined) el.value = data.meta[k];
        });
      }
      const opEl = document.getElementById('mix-opacity');
      if (opEl) { opEl.value = Math.round(state.mixOpacity * 100); }
      document.getElementById('mix-pct').textContent = `${Math.round(state.mixOpacity * 100)}%`;
      updatePlateUI('a');
      updatePlateUI('b');
      rebuildAdvancedUI('a');
      rebuildAdvancedUI('b');
      // Restore UI state
      setPillActive('pill-match', state.matchMode === 'match' ? 0 : 1);
      setPillActive('pill-view', state.viewMode === 'graf' ? 0 : 1);
      setPillActive('pill-compare', ['mix','split','wipe'].indexOf(state.compareMode));
      setPillActive('pill-framing', ['face','medium','full'].indexOf(state.framing));
      setPillActive('pill-lock', state.lockedPlate === 'a' ? 0 : 1);
      document.getElementById('mix-ctrl').style.display = state.compareMode === 'mix' ? 'flex' : 'none';
      updateControlVisibility();
      render();
    } catch(err) { alert('Error reading file: ' + err.message); }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

// Head + body only (no legs), matching v12 style
function personSilhouetteSVG(cx, bottomY, h, color, filled, opacity) {
  const headR    = h * 0.11;
  const headCy   = bottomY - h + headR;
  const bodyTop  = headCy + headR * 0.85;
  const bodyW    = h * 0.26;
  const fill     = filled ? color : 'none';
  const sw       = filled ? 1.5 : 2;
  const op       = opacity !== undefined ? opacity : 1;
  let s = `<g opacity="${op}">`;
  s += `<circle cx="${cx}" cy="${headCy}" r="${headR}" fill="${fill}" stroke="${color}" stroke-width="${sw}"/>`;
  s += `<path d="M${cx-bodyW/2},${bottomY} L${cx-bodyW*0.62},${bodyTop} Q${cx},${bodyTop-h*0.04} ${cx+bodyW*0.62},${bodyTop} L${cx+bodyW/2},${bottomY} Z" fill="${fill}" stroke="${color}" stroke-width="${sw}" stroke-linejoin="round"/>`;
  s += `</g>`;
  return s;
}

// ─── GRAF RENDER ──────────────────────────────────────────────────────────────
function renderGraf() {
  const svg = document.getElementById('graf-svg');
  if (!svg) return;
  const area = svg.parentElement;
  if (!area.clientWidth || !area.clientHeight) { if (state.viewMode === 'graf') requestAnimationFrame(renderGraf); return; }
  const W = area.clientWidth;
  const H = area.clientHeight;

  const groundY = H * 0.86;
  const pa = state.a, pb = state.b;

  // Locked plate = fixed reference height; other plate scales
  const hRef = groundY * 0.62;
  const lockA = state.lockedPlate !== 'b';
  const apparentA = pa.linearDist > 0 ? pa.objectHeight / pa.linearDist : 1;
  const apparentB = pb.linearDist > 0 ? pb.objectHeight / pb.linearDist : 1;

  let hA, hB, matchZoom = null;
  if (state.matchMode === 'real') {
    // PROP: misma figura de referencia, tamaño inversamente proporcional a la distancia.
    if (lockA) {
      hA = hRef;
      hB = pb.linearDist > 0 ? hRef * (pa.linearDist / pb.linearDist) : hRef;
    } else {
      hB = hRef;
      hA = pa.linearDist > 0 ? hRef * (pb.linearDist / pa.linearDist) : hRef;
    }
  } else {
    // MATCH: non-locked plate zoomed to match locked plate size
    hA = hRef; hB = hRef;
    if (apparentA > 0 && apparentB > 0) {
      matchZoom = lockA ? apparentA / apparentB : apparentB / apparentA;
    }
  }
  hA = Math.max(8, Math.min(hA, groundY * 0.98));
  hB = Math.max(8, Math.min(hB, groundY * 0.98));

  const cm = state.compareMode;
  const cxCenter = W / 2;
  const cxA = cm === 'split' ? W * 0.28 : cxCenter;
  const cxB = cm === 'split' ? W * 0.72 : cxCenter;
  const opB = cm === 'mix' ? state.mixOpacity : 1;

  const isLight = document.body.classList.contains('light-mode');
  const skyTop   = isLight ? '#c8dff0' : '#060a12';
  const skyBot   = isLight ? '#dde8f2' : '#0d1a2a';
  const groundFill  = isLight ? '#c8d8c8' : '#07100d';
  const groundStroke = isLight ? '#7aaa88' : '#1a3020';
  const splitStroke  = isLight ? '#b0bcc8' : '#192436';

  let html = `<defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="${skyTop}"/><stop offset="100%" stop-color="${skyBot}"/>
    </linearGradient>`;
  if (cm === 'wipe') {
    const wx = state.wipeX * W;
    html += `<clipPath id="clipA"><rect x="0" y="0" width="${wx}" height="${H}"/></clipPath>
             <clipPath id="clipB"><rect x="${wx}" y="0" width="${W-wx}" height="${H}"/></clipPath>`;
  }
  html += `</defs>`;
  html += `<rect x="0" y="0" width="${W}" height="${groundY}" fill="url(#sky)"/>`;
  html += `<rect x="0" y="${groundY}" width="${W}" height="${H-groundY}" fill="${groundFill}"/>`;
  html += `<line x1="0" y1="${groundY}" x2="${W}" y2="${groundY}" stroke="${groundStroke}" stroke-width="1"/>`;

  if (cm === 'split') {
    html += `<line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="${splitStroke}" stroke-width="1"/>`;
    html += personSilhouetteSVG(cxA, groundY, hA, '#bf3830', false);
    html += personSilhouetteSVG(cxB, groundY, hB, '#1e70b8', true);
  } else if (cm === 'wipe') {
    html += `<g clip-path="url(#clipA)">${personSilhouetteSVG(cxCenter, groundY, hA, '#bf3830', false)}</g>`;
    html += `<g clip-path="url(#clipB)">${personSilhouetteSVG(cxCenter, groundY, hB, '#1e70b8', true)}</g>`;
    const wx = state.wipeX * W;
    html += `<line x1="${wx}" y1="0" x2="${wx}" y2="${H}" stroke="${isLight ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.3)'}" stroke-width="2"/>`;
  } else {
    html += personSilhouetteSVG(cxCenter, groundY, hA, '#bf3830', false, cm === 'mix' ? 0.55 : 1);
    html += personSilhouetteSVG(cxCenter, groundY, hB, '#1e70b8', true, opB);
  }

  // MATCH zoom label — esquina superior exterior del plano no bloqueado (igual que 3D)
  if (matchZoom !== null) {
    const zStr = matchZoom >= 1 ? `ZOOM ×${matchZoom.toFixed(1)}` : `ZOOM ×${matchZoom.toFixed(2)}`;
    const zColor = lockA ? '#4fa8ff' : '#e2594c';
    const zX = lockA ? W - 10 : 10;
    const zAnchor = lockA ? 'end' : 'start';
    html += `<text x="${zX}" y="20" text-anchor="${zAnchor}" font-family="ui-monospace,monospace" font-size="10" fill="${zColor}" opacity="0.9">${zStr}</text>`;
  }

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = html;
}

// ─── SIDE VIEW RENDER ─────────────────────────────────────────────────────────
function renderSideView() {
  const svg = document.getElementById('side-svg');
  if (!svg) return;
  const W = svg.clientWidth || 1000;
  const H = svg.clientHeight || 300;

  const pad    = Math.round(W * 0.02);
  const leftM  = 52 + pad;   // A label + camera dot
  const rightM = 52 + pad;   // symmetric right margin
  const topM   = 24 + pad;   // title
  const botM   = 36 + pad;   // ticks + legend
  const drawW  = W - leftM - rightM;
  const drawH  = H - topM - botM;

  const pa = state.a, pb = state.b;
  const maxLD = Math.max(pa.linearDist, pb.linearDist, 0.5);
  const maxOH = Math.max(pa.objectHeight, pb.objectHeight, 0.5);

  const scaleX = drawW / maxLD;
  // Scale Y so tallest object fills ~72% of draw area — camera stays near ground
  const scaleY = (drawH * 0.72) / maxOH;

  const groundY  = topM + drawH;
  const drawRight = W - rightM;  // right edge of drawing area
  const toX = v => leftM + v * scaleX;
  const toY = v => groundY - v * scaleY;

  const camX  = leftM - 8;
  const camAY = toY(pa.cameraHeight);
  const camBY = toY(pb.cameraHeight);
  const objAX = toX(pa.linearDist), objATopY = toY(pa.objectHeight);
  const objBX = toX(pb.linearDist), objBTopY = toY(pb.objectHeight);

  const mono = 'font-family="ui-monospace,monospace"';
  const clrA = '#bf3830', clrB = '#1e70b8';
  const isLight   = document.body.classList.contains('light-mode');
  const svgBg     = isLight ? '#f0f4f8' : '#060a10';
  const groundClr = isLight ? '#7aaa88' : '#1e3a20';
  const mutedClr  = isLight ? '#4a6478' : '#5c7e9a';

  let html = `<rect x="0" y="0" width="${W}" height="${H}" fill="${svgBg}"/>`;

  // Title
  html += `<text x="${pad+8}" y="${pad+14}" ${mono} font-size="9" fill="${mutedClr}" letter-spacing="0.1em">SIDE VIEW — PLATE 01 / PLATE 02</text>`;

  // Ground line
  html += `<line x1="${camX-6}" y1="${groundY}" x2="${drawRight}" y2="${groundY}" stroke="${groundClr}" stroke-width="1.5"/>`;

  // Distance ticks
  const rawStep = maxLD / 5;
  const tickStep = rawStep < 0.8 ? 0.5 : rawStep < 2 ? 1 : rawStep < 4 ? 2 : rawStep < 9 ? 5 : 10;
  for (let d = 0; d <= maxLD + 0.001; d += tickStep) {
    const tx = toX(d);
    if (tx >= leftM - 4 && tx <= drawRight + 4) {
      html += `<line x1="${tx}" y1="${groundY}" x2="${tx}" y2="${groundY+5}" stroke="${groundClr}" stroke-width="1"/>`;
      html += `<text x="${tx}" y="${groundY+17}" text-anchor="middle" ${mono} font-size="9" fill="${mutedClr}">${Number.isInteger(d) ? d+'m' : d.toFixed(1)+'m'}</text>`;
    }
  }

  // ── Plate A (red) — drawn first so blue goes on top ──
  // Dashed at C height → full width
  html += `<line x1="${camX}" y1="${objATopY}" x2="${drawRight}" y2="${objATopY}" stroke="${clrA}" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>`;
  // Dashed at camera height → to object base (linear distance)
  html += `<line x1="${camX}" y1="${camAY}" x2="${objAX}" y2="${camAY}" stroke="${clrA}" stroke-width="0.9" stroke-dasharray="5,4" opacity="0.55"/>`;
  // Vertical object bar
  html += `<line x1="${objAX}" y1="${groundY}" x2="${objAX}" y2="${objATopY}" stroke="${clrA}" stroke-width="1.5" opacity="0.65"/>`;
  // Line of sight
  html += `<line x1="${camX}" y1="${camAY}" x2="${objAX}" y2="${objATopY}" stroke="${clrA}" stroke-width="1.8"/>`;
  // Angle label
  html += `<text x="${camX+14}" y="${camAY-6}" ${mono} font-size="9" fill="${clrA}">${pa.tilt.toFixed(1)}°</text>`;
  // Camera dot + A label
  html += `<circle cx="${camX}" cy="${camAY}" r="4" fill="${clrA}"/>`;
  html += `<text x="${camX-8}" y="${camAY+4}" text-anchor="end" ${mono} font-size="10" fill="${clrA}" font-weight="bold">A</text>`;
  // B dot on ground
  html += `<circle cx="${objAX}" cy="${groundY}" r="3" fill="${clrA}"/>`;
  html += `<text x="${objAX}" y="${groundY+28}" text-anchor="middle" ${mono} font-size="9" fill="${clrA}">B</text>`;
  // C dot + label next to its own C point (flip to left if near right edge)
  html += `<circle cx="${objAX}" cy="${objATopY}" r="4" fill="${clrA}"/>`;
  { const flip = objAX > drawRight - 140;
    html += `<text x="${flip ? objAX-8 : objAX+8}" y="${objATopY-6}" text-anchor="${flip ? 'end' : 'start'}" ${mono} font-size="9" fill="${clrA}">Plate 01: C ${pa.objectHeight.toFixed(2)}m</text>`; }

  // ── Plate B (blue) ──
  html += `<line x1="${camX}" y1="${objBTopY}" x2="${drawRight}" y2="${objBTopY}" stroke="${clrB}" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>`;
  html += `<line x1="${camX}" y1="${camBY}" x2="${objBX}" y2="${camBY}" stroke="${clrB}" stroke-width="0.9" stroke-dasharray="5,4" opacity="0.55"/>`;
  html += `<line x1="${objBX}" y1="${groundY}" x2="${objBX}" y2="${objBTopY}" stroke="${clrB}" stroke-width="1.5" opacity="0.65"/>`;
  html += `<line x1="${camX}" y1="${camBY}" x2="${objBX}" y2="${objBTopY}" stroke="${clrB}" stroke-width="1.8"/>`;
  html += `<text x="${camX+14}" y="${camBY+14}" ${mono} font-size="9" fill="${clrB}">${pb.tilt.toFixed(1)}°</text>`;
  html += `<circle cx="${camX}" cy="${camBY}" r="4" fill="${clrB}"/>`;
  html += `<text x="${camX-8}" y="${camBY+4}" text-anchor="end" ${mono} font-size="10" fill="${clrB}" font-weight="bold">A</text>`;
  html += `<circle cx="${objBX}" cy="${groundY}" r="3" fill="${clrB}"/>`;
  html += `<text x="${objBX}" y="${groundY+28}" text-anchor="middle" ${mono} font-size="9" fill="${clrB}">B</text>`;
  html += `<circle cx="${objBX}" cy="${objBTopY}" r="4" fill="${clrB}"/>`;
  { const flip = objBX > drawRight - 140;
    html += `<text x="${flip ? objBX-8 : objBX+8}" y="${objBTopY-6}" text-anchor="${flip ? 'end' : 'start'}" ${mono} font-size="9" fill="${clrB}">Plate 02: C ${pb.objectHeight.toFixed(2)}m</text>`; }

  // Legend / scale note
  const ly = H - pad - 4;
  html += `<text x="${pad+8}" y="${ly}" ${mono} font-size="8" fill="${mutedClr}">Vertical scale amplified for angle clarity (horizontal distances are to scale relative to each other).</text>`;
  const legX = (leftM + drawRight) / 2 - 40;
  html += `<circle cx="${legX}" cy="${ly-3}" r="3" fill="${clrA}"/><text x="${legX+7}" y="${ly}" ${mono} font-size="8" fill="${clrA}">Plate 01</text>`;
  html += `<circle cx="${legX+68}" cy="${ly-3}" r="3" fill="${clrB}"/><text x="${legX+75}" y="${ly}" ${mono} font-size="8" fill="${clrB}">Plate 02</text>`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = html;
}

// ─── 3D RENDERER ──────────────────────────────────────────────────────────────
let threeLoaded = false, threeLoading = false;
let threeScene = null, threeRenderer = null, threeCamera = null;
let threeMeshA = null, threeMeshB = null, threeMatB = null;
let threeMeshSize = null;
let threeBBoxMinY = 0;
let threeCanvas3D = null;

function loadThree(cb) {
  if (threeLoaded) { cb(); return; }
  if (threeLoading) { setTimeout(()=>loadThree(cb), 100); return; }
  threeLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload = () => { threeLoaded = true; cb(); };
  s.onerror = () => { threeLoading = false; console.warn('Three.js failed to load'); };
  document.head.appendChild(s);
}

function base64ToFloat32(b64) {
  const bin = atob(b64); const buf = new ArrayBuffer(bin.length);
  const bytes = new Uint8Array(buf);
  for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new Float32Array(buf);
}
function base64ToUint16(b64) {
  const bin = atob(b64); const buf = new ArrayBuffer(bin.length);
  const bytes = new Uint8Array(buf);
  for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new Uint16Array(buf);
}

function buildThreeMesh(THREE) {
  try {
    const pos = base64ToFloat32(MESH_POS_B64);
    const idx = base64ToUint16(MESH_IDX_B64);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setIndex(new THREE.BufferAttribute(idx, 1));
    geo.computeVertexNormals();
    return geo;
  } catch(e) {
    console.warn('Mesh load failed:', e);
    return new THREE.CylinderGeometry(0.2, 0.25, 1.6, 12);
  }
}

function init3D() {
  if (!threeLoaded || !window.THREE) return;
  const THREE = window.THREE;
  const area = document.getElementById('canvas-area');
  area.innerHTML = '';
  const W = area.clientWidth, H = area.clientHeight;

  // Single scene, single renderer
  threeScene = new THREE.Scene();
  threeScene.background = new THREE.Color(document.body.classList.contains('light-mode') ? 0xd0dcea : 0x04060b);
  threeScene.add(new THREE.AmbientLight(0x334466, 0.9));
  const dir1 = new THREE.DirectionalLight(0xffffff, 1.2); dir1.position.set(2,5,3); threeScene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0x6688aa, 0.3); dir2.position.set(-2,1,-1); threeScene.add(dir2);
  threeScene.add(new THREE.GridHelper(6, 12, 0x0d1a10, 0x0d1a10));

  const geo = buildThreeMesh(THREE);
  geo.computeBoundingBox();
  const box = geo.boundingBox;
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  threeMeshSize = size;
  threeBBoxMinY = box.min.y;

  const baseOffset = center.clone().negate();
  baseOffset.y += size.y / 2;

  threeMeshA = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0xbf3830, shininess:30}));
  threeMeshA.position.copy(baseOffset);
  threeScene.add(threeMeshA);

  threeMatB = new THREE.MeshPhongMaterial({color:0x1e70b8, shininess:30, transparent:true, opacity:1});
  threeMeshB = new THREE.Mesh(geo, threeMatB);
  threeMeshB.position.copy(baseOffset);
  threeScene.add(threeMeshB);

  threeCamera = new THREE.PerspectiveCamera(35, W/H, 0.01, 1000);

  threeRenderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
  threeRenderer.setSize(W, H);
  threeRenderer.setPixelRatio(window.devicePixelRatio);
  threeRenderer.autoClear = false;

  area.appendChild(threeRenderer.domElement);
  threeCanvas3D = threeRenderer.domElement;

  render3D();
}

function updateThreeMeshScale() {
  if (!threeMeshA || !threeMeshB || !threeMeshSize) return;
  // Mismo tamaño para ambos meshes siempre — en PROP la diferencia de escala
  // emerge de las distancias físicas distintas de cada cámara.
  threeMeshA.scale.setScalar(1);
  threeMeshA.position.y = -threeBBoxMinY;
  threeMeshB.scale.setScalar(1);
  threeMeshB.position.y = -threeBBoxMinY;
}

// halfFrac = mitad de la región visible (del centro del encuadre al borde)
// lookFrac = fracción del modelo donde mira la cámara (centro del encuadre)
const THREE_CAM_FRAMING = {
  face:   { halfFrac: 0.07, tFrac: 0.55, lookFrac: 0.94 },
  medium: { halfFrac: 0.25, tFrac: 0.80, lookFrac: 0.76 },
  full:   { halfFrac: 0.50, tFrac: 0.85, lookFrac: 0.50 },
};

// VFoV real de la cámara si el modo Advanced está activo y los datos son completos; null si no.
function getRealVFov(p) {
  if (!p.advancedMode) return null;
  const side = p === state.a ? 'a' : 'b';
  if (p.modelIdx >= 0 && p.modeIdx >= 0 && p.lens > 0) {
    const model = getCamModel(side);
    if (model && model.modes[p.modeIdx]) {
      const mode = model.modes[p.modeIdx];
      return 2 * deg(Math.atan(mode.sh / (2 * p.lens)));
    }
  }
  return null;
}

// FOV para el viewer 3D:
// · REAL sin Advanced  → FOV calculado desde el plate bloqueado para enmarcar el body part elegido;
//                         ese mismo FOV se aplica a ambas cámaras (focal length consistente).
//                         La diferencia de tamaño emerge de las distancias físicas distintas.
// · REAL con Advanced  → VFoV real del sensor+óptica introducido en el plano.
// · MATCH              → auto-FOV normalizado (ambas figuras al mismo tamaño, se compara el tilt).
function getCamFov(p) {
  if (state.matchMode === 'real') {
    const realFov = getRealVFov(p);
    if (realFov !== null) return Math.min(realFov, 90);
    if (!threeMeshSize) return 39;
    // PROP no-Advanced: FOV derivado del plate bloqueado (referencia fija).
    // Ambas cámaras comparten el mismo FOV → cambiar camera height produce tilt visible.
    const refP = state.lockedPlate !== 'b' ? state.a : state.b;
    const mh   = threeMeshSize.y;
    const sc   = refP.objectHeight > 0.01 ? mh / refP.objectHeight : 1;
    const camY = refP.cameraHeight * sc;
    const camZ = Math.max(refP.linearDist, 0.01) * sc;
    const { halfFrac, tFrac, lookFrac } = THREE_CAM_FRAMING[state.framing] || THREE_CAM_FRAMING.full;
    const dist   = Math.hypot(camZ, mh * lookFrac - camY);
    const rawFov = 2 * Math.atan2(mh * halfFrac, dist) * 180 / Math.PI;
    return Math.min(rawFov / tFrac, 90);
  }
  // MATCH: auto-FOV normalizado
  const mh  = threeMeshSize.y;
  const sc  = p.objectHeight > 0.01 ? mh / p.objectHeight : 1;
  const camY = p.cameraHeight * sc;
  const camZ = Math.max(p.linearDist, 0.01) * sc;
  const { halfFrac, tFrac, lookFrac } = THREE_CAM_FRAMING[state.framing] || THREE_CAM_FRAMING.full;
  const dist = Math.hypot(camZ, mh * lookFrac - camY);
  const rawFov = 2 * Math.atan2(mh * halfFrac, dist) * 180 / Math.PI;
  return Math.min(rawFov / tFrac, 90);
}

// Aplica cámara al plano p. fovOverride permite forzar un FOV concreto (modo REAL).
// Cámara en (0, cameraHeight·sc, linearDist·sc) mirando al TOP del mesh → el tilt emerge de la geometría.
// Con FOV real de cámara, el lookAt se ajusta al framing para centrar la zona de interés.
function applyCamera(p, aspect, fovOverride) {
  const mh  = threeMeshSize.y;
  const fov = fovOverride !== undefined ? fovOverride : getCamFov(p);
  const isAdv = state.a.advancedMode || state.b.advancedMode;
  const { lookFrac: framingLF } = THREE_CAM_FRAMING[state.framing] || THREE_CAM_FRAMING.full;
  const lookY = mh * (isAdv ? EYES_LOOK_FRAC : framingLF);

  let camY, camZ;
  if (state.matchMode === 'real') {
    const refP  = state.lockedPlate !== 'b' ? state.a : state.b;
    const scRef = refP.objectHeight > 0.01 ? mh / refP.objectHeight : 1;
    const hNorm = p.objectHeight   > 0.01 ? refP.objectHeight / p.objectHeight : 1;
    camY = p.cameraHeight * hNorm * scRef;

    // PROP: distancia física escalada al mesh de referencia. El tamaño aparente difiere según distancia real.
    camZ = Math.max(p.linearDist, 0.01) * scRef;
  } else {
    const sc = p.objectHeight > 0.01 ? mh / p.objectHeight : 1;
    camY = p.cameraHeight * sc;
    camZ = Math.max(p.linearDist, 0.01) * sc;
  }

  threeCamera.fov    = fov;
  threeCamera.aspect = aspect;
  threeCamera.updateProjectionMatrix();
  threeCamera.position.set(0, camY, camZ);
  threeCamera.lookAt(0, lookY, 0);
}

function updateThreeCam() {
  if (!threeCamera || !threeMeshSize) return;
  const lockA = state.lockedPlate !== 'b';
  const W = threeCanvas3D ? threeCanvas3D.width  / window.devicePixelRatio : 800;
  const H = threeCanvas3D ? threeCanvas3D.height / window.devicePixelRatio : 600;
  applyCamera(lockA ? state.a : state.b, W / H, undefined);
}

function render3D() {
  if (!threeLoaded || !threeRenderer) return;
  const area = threeCanvas3D ? threeCanvas3D.parentElement : null;
  if (area && threeRenderer) {
    const newW = area.clientWidth, newH = area.clientHeight;
    if (newW > 0 && newH > 0) {
      threeRenderer.setSize(newW, newH);
      threeCamera.aspect = newW / newH;
      threeCamera.updateProjectionMatrix();
    }
  }
  const THREE = window.THREE;
  const cm = state.compareMode;
  const canvas = threeRenderer.domElement;
  const W = canvas.width / window.devicePixelRatio;
  const H = canvas.height / window.devicePixelRatio;

  updateThreeMeshScale();
  threeRenderer.clear();

  // REAL: cada cámara usa su propio getCamFov (39° fijo o VFoV real según Advanced).
  //        La diferencia de tamaño aparente emerge de las distancias reales de cada plano.
  // MATCH: idem, pero getCamFov devuelve auto-FOV normalizado → figuras al mismo tamaño.
  const lockA3D = state.lockedPlate !== 'b';

  if (cm === 'split') {
    const half = Math.floor(W / 2);
    threeRenderer.setScissorTest(true);
    threeRenderer.setViewport(0, 0, half, H);
    threeRenderer.setScissor(0, 0, half, H);
    applyCamera(state.a, half / H);
    threeMeshA.visible = true; threeMeshB.visible = false;
    threeRenderer.render(threeScene, threeCamera);
    threeRenderer.setViewport(half, 0, half, H);
    threeRenderer.setScissor(half, 0, half, H);
    applyCamera(state.b, half / H);
    threeMeshA.visible = false; threeMeshB.visible = true;
    threeMatB.opacity = 1;
    threeRenderer.render(threeScene, threeCamera);
    threeRenderer.setScissorTest(false);
    threeMeshA.visible = true; threeMeshB.visible = true;
  } else if (cm === 'wipe') {
    const wx = Math.round(state.wipeX * W);
    threeRenderer.setViewport(0, 0, W, H);
    threeRenderer.setScissorTest(true);
    threeRenderer.setScissor(0, 0, wx, H);
    applyCamera(state.a, W / H);
    threeMeshA.visible = true; threeMeshB.visible = false;
    threeRenderer.render(threeScene, threeCamera);
    threeRenderer.setScissor(wx, 0, W - wx, H);
    applyCamera(state.b, W / H);
    threeMeshA.visible = false; threeMeshB.visible = true;
    threeMatB.opacity = 1;
    threeRenderer.render(threeScene, threeCamera);
    threeRenderer.setScissorTest(false);
    threeMeshA.visible = true; threeMeshB.visible = true;
  } else {
    threeRenderer.setViewport(0, 0, W, H);
    threeRenderer.setScissorTest(false);
    if (state.matchMode === 'real') {
      // PROP MIX: dos passes — mesh A desde camera A, mesh B desde camera B encima
      applyCamera(state.a, W / H);
      threeMeshA.visible = true; threeMeshB.visible = false;
      threeRenderer.render(threeScene, threeCamera);
      // Pass 2: preservar color, limpiar depth, quitar background para no sobreescribir
      const savedBg = threeScene.background;
      threeScene.background = null;
      threeRenderer.clearDepth();
      applyCamera(state.b, W / H);
      threeMeshA.visible = false; threeMeshB.visible = true;
      threeMatB.opacity = state.mixOpacity;
      threeRenderer.render(threeScene, threeCamera);
      threeScene.background = savedBg;
      threeMeshA.visible = true; threeMeshB.visible = true;
    } else {
      // MATCH MIX: cámara del plate bloqueado, ambos meshes superpuestos al mismo tamaño
      applyCamera(lockA3D ? state.a : state.b, W / H);
      threeMeshA.visible = true; threeMeshB.visible = true;
      threeMatB.opacity = state.mixOpacity;
      threeRenderer.render(threeScene, threeCamera);
    }
  }

  // ─── HTML overlay: wipe line + zoom label ─────────────────────────────────
  const area3D = threeCanvas3D ? threeCanvas3D.parentElement : null;
  if (!area3D) return;
  let ov = document.getElementById('overlay-3d');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'overlay-3d';
    ov.style.cssText = 'position:absolute;inset:0;pointer-events:none;overflow:hidden;font-family:ui-monospace,monospace;';
    area3D.appendChild(ov);
  }
  let ovHTML = '';
  if (cm === 'wipe') {
    const pct = (state.wipeX * 100).toFixed(2);
    ovHTML += `<div style="position:absolute;top:0;bottom:0;left:${pct}%;width:2px;background:rgba(255,255,255,0.35);transform:translateX(-50%);cursor:ew-resize;pointer-events:all;"></div>`;
  } else if (cm === 'split') {
    ovHTML += `<div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:#192436;"></div>`;
  }
  if (state.matchMode === 'match') {
    const lockA3 = state.lockedPlate !== 'b';
    const appA3 = state.a.linearDist > 0 ? state.a.objectHeight / state.a.linearDist : 0;
    const appB3 = state.b.linearDist > 0 ? state.b.objectHeight / state.b.linearDist : 0;
    if (appA3 > 0 && appB3 > 0) {
      const zoom3 = lockA3 ? appA3 / appB3 : appB3 / appA3;
      const zColor3 = lockA3 ? '#4fa8ff' : '#e2594c';
      const zStr3 = zoom3 >= 1 ? `ZOOM ×${zoom3.toFixed(1)}` : `ZOOM ×${zoom3.toFixed(2)}`;
      // Top-exterior del plano no bloqueado: lockA → plate B a la derecha; lockB → plate A a la izquierda
      const zPos = lockA3 ? 'top:10px;right:10px' : 'top:10px;left:10px';
      ovHTML += `<div style="position:absolute;${zPos};font-size:10px;font-family:ui-monospace,monospace;color:${zColor3};opacity:0.9;">${zStr3}</div>`;
    }
  }
  // Aviso si Advanced está activo pero el modo no lo usa
  if (state.matchMode !== 'real' && (state.a.advancedMode || state.b.advancedMode)) {
    ovHTML += `<div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:9px;font-family:ui-monospace,monospace;color:#f0a500;opacity:0.85;white-space:nowrap;background:rgba(0,0,0,0.5);padding:3px 8px;border-radius:3px;">ADVANCED · switch to PROP to use camera data</div>`;
  }
  ov.innerHTML = ovHTML;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  if (state.viewMode === 'graf') {
    const area = document.getElementById('canvas-area');
    if (threeCanvas3D && area.contains(threeCanvas3D)) {
      area.innerHTML = '<svg id="graf-svg" style="flex:1;width:100%;height:100%;display:block"></svg>';
      threeCanvas3D = null;
    } else if (!document.getElementById('graf-svg')) {
      area.innerHTML = '<svg id="graf-svg" style="flex:1;width:100%;height:100%;display:block"></svg>';
    }
    renderGraf();
  } else {
    if (!threeLoaded) {
      loadThree(() => { init3D(); render3D(); });
    } else {
      if (!threeCanvas3D) init3D();
      render3D();
    }
  }
  renderSideView();

  // Camera-too-close warning
  const warnEl = document.getElementById('cam-warning');
  if (warnEl) {
    const pa = state.a, pb = state.b;
    const tooCloseA = pa.linearDist < 0.3 || (pa.objectHeight > 0 && pa.linearDist / pa.objectHeight < 0.08);
    const tooCloseB = pb.linearDist < 0.3 || (pb.objectHeight > 0 && pb.linearDist / pb.objectHeight < 0.08);
    const who = tooCloseA && tooCloseB ? 'Plates 01 & 02'
              : tooCloseA ? 'Plate 01' : tooCloseB ? 'Plate 02' : null;
    if (who) {
      warnEl.style.display = 'block';
      warnEl.querySelector('.cam-warning-box').textContent = `⚠ ${who}: camera too close — perspective may be invalid`;
    } else {
      warnEl.style.display = 'none';
    }
  }
}

// ─── WIPE DRAG ────────────────────────────────────────────────────────────────
let wipeDragging = false;
function wipeStart(clientX, target) {
  if (state.compareMode !== 'wipe') return false;
  const area = document.getElementById('canvas-area');
  if (!area || !area.contains(target)) return false;
  const rect = area.getBoundingClientRect();
  if (Math.abs(clientX - rect.left - state.wipeX * rect.width) < 32) {
    wipeDragging = true; return true;
  }
  return false;
}
function wipeMove(clientX) {
  if (!wipeDragging) return;
  const area = document.getElementById('canvas-area');
  if (!area) return;
  const rect = area.getBoundingClientRect();
  state.wipeX = clamp((clientX - rect.left) / rect.width, 0, 1);
  render();
}
document.addEventListener('mousedown', (e) => { if (wipeStart(e.clientX, e.target)) e.preventDefault(); });
document.addEventListener('mousemove', (e) => wipeMove(e.clientX));
document.addEventListener('mouseup', () => { wipeDragging = false; });
document.addEventListener('touchstart', (e) => { if (e.touches.length === 1 && wipeStart(e.touches[0].clientX, e.target)) e.preventDefault(); }, {passive:false});
document.addEventListener('touchmove', (e) => { if (wipeDragging && e.touches.length === 1) { e.preventDefault(); wipeMove(e.touches[0].clientX); } }, {passive:false});
document.addEventListener('touchend', () => { wipeDragging = false; });

// ─── CAMERA DROPDOWN LOGIC ────────────────────────────────────────────────────
function initCatSelect(side) {
  const cats = [...new Set(CAM_DB.map(c=>c.cat))];
  const sel = document.getElementById(`${side}-cat`);
  sel.innerHTML = '<option value="">— Any —</option>';
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function updateMakeSelect(side) {
  const p = state[side];
  const sel = document.getElementById(`${side}-make`);
  const filtered = p.cat ? CAM_DB.filter(c=>c.cat===p.cat) : CAM_DB;
  const makes = [...new Set(filtered.map(c=>c.make))];
  sel.innerHTML = '<option value="">— Any —</option>';
  makes.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });
  p.make = '';
  updateModelSelect(side);
}

function updateModelSelect(side) {
  const p = state[side];
  const sel = document.getElementById(`${side}-model`);
  let filtered = CAM_DB;
  if (p.cat) filtered = filtered.filter(c=>c.cat===p.cat);
  if (p.make) filtered = filtered.filter(c=>c.make===p.make);
  sel.innerHTML = '<option value="-1">— Select —</option>';
  filtered.forEach((c,i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = c.name;
    sel.appendChild(o);
  });
  p.modelIdx = -1;
  updateModeSelect(side);
}

function updateModeSelect(side) {
  const p = state[side];
  const sel = document.getElementById(`${side}-mode`);
  sel.innerHTML = '<option value="-1">— Select —</option>';
  if (p.modelIdx >= 0) {
    const model = getCamModel(side);
    if (model) {
      model.modes.forEach((m,i) => {
        const o = document.createElement('option');
        o.value = i; o.textContent = (m.w && m.h) ? `${m.n} — ${m.w}×${m.h}` : m.n;
        sel.appendChild(o);
      });
    }
  }
  p.modeIdx = -1;
  updateFOV(side);
}

function onCatChange(side) {
  state[side].cat = document.getElementById(`${side}-cat`).value;
  updateMakeSelect(side);
  if (side === 'a' && state.b.advLinked) syncAdvancedToB();
}
function onMakeChange(side) {
  state[side].make = document.getElementById(`${side}-make`).value;
  updateModelSelect(side);
  if (side === 'a' && state.b.advLinked) syncAdvancedToB();
}
function onModelChange(side) {
  const sel = document.getElementById(`${side}-model`);
  state[side].modelIdx = parseInt(sel.value);
  updateModeSelect(side);
  if (side === 'a' && state.b.advLinked) syncAdvancedToB();
  render();
}
function onModeChange(side) {
  const p = state[side];
  const sel = document.getElementById(`${side}-mode`);
  p.modeIdx = parseInt(sel.value);
  if (p.modelIdx >= 0 && p.modeIdx >= 0) {
    const model = getCamModel(side);
    if (model && model.modes[p.modeIdx]) {
      const mode = model.modes[p.modeIdx];
      p.ar = parseFloat((mode.w/mode.h).toFixed(3));
      document.getElementById(`${side}-ar`).value = p.ar.toFixed(2);
    }
  }
  updateFOV(side);
  if (side === 'a' && state.b.advLinked) syncAdvancedToB();
  render();
}

// ─── EVENT WIRING ─────────────────────────────────────────────────────────────
function wireField(side, field, numId, rngId) {
  const num = document.getElementById(numId);
  const rng = document.getElementById(rngId);
  if (num) {
    num.addEventListener('input', () => { onFieldChange(side, field, num.value, 'num'); });
    num.addEventListener('change', () => { onFieldChange(side, field, num.value, 'num'); });
  }
  if (rng) {
    rng.addEventListener('input', () => {
      if (num) num.value = rng.value;
      onFieldChange(side, field, rng.value, 'rng');
    });
  }
}

function init() {
  // Wire fields
  ['a','b'].forEach(s => {
    wireField(s, 'camH', `${s}-camH-num`, `${s}-camH-rng`);
    wireField(s, 'tilt', `${s}-tilt-num`, `${s}-tilt-rng`);
    wireField(s, 'objH', `${s}-objH-num`, `${s}-objH-rng`);
    wireField(s, 'hd',   `${s}-hd-num`,   `${s}-hd-rng`);
    wireField(s, 'ld',   `${s}-ld-num`,   `${s}-ld-rng`);
    wireField(s, 'sd',   `${s}-sd-num`,   `${s}-sd-rng`);

    // Camera DB selects
    initCatSelect(s);
    document.getElementById(`${s}-cat`).addEventListener('change', ()=>onCatChange(s));
    document.getElementById(`${s}-make`).addEventListener('change', ()=>onMakeChange(s));
    document.getElementById(`${s}-model`).addEventListener('change', ()=>onModelChange(s));
    document.getElementById(`${s}-mode`).addEventListener('change', ()=>onModeChange(s));

    const lensNum = document.getElementById(`${s}-lens`);
    const lensRng = document.getElementById(`${s}-lens-rng`);
    lensNum.addEventListener('input', e => {
      const v = parseFloat(e.target.value)||35;
      state[s].lens = v;
      if (document.activeElement !== lensRng) lensRng.value = Math.min(Math.max(v,12),300);
      updateFOV(s); render();
    });
    lensRng.addEventListener('input', e => {
      const v = parseFloat(e.target.value)||35;
      state[s].lens = v;
      if (document.activeElement !== lensNum) lensNum.value = v;
      updateFOV(s); render();
    });
    document.getElementById(`${s}-ar`).addEventListener('input', e => {
      state[s].ar = parseFloat(e.target.value)||1.78;
      updateFOV(s);
      if (s === 'a' && state.b.advLinked) syncAdvancedToB();
      render();
    });

    updateMakeSelect(s);
    updateModelSelect(s);
    updateModeSelect(s);
  });

  // Mix opacity
  document.getElementById('mix-opacity').addEventListener('input', e => {
    setMixOpacity(e.target.value);
  });

  // Initial UI
  updatePlateUI('a');
  updatePlateUI('b');

  // Initial render
  render();

  // Resize observer
  const area = document.getElementById('canvas-area');
  if (window.ResizeObserver) {
    new ResizeObserver(() => render()).observe(area);
  }
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function applyResponsiveLayout() {
  if (_userLayoutLocked) { render(); return; }
  const compact = window.innerWidth <= 1100;
  document.body.classList.toggle('layout-compact', compact);
  const btn = document.getElementById('btn-layout');
  if (btn) {
    btn.childNodes[btn.childNodes.length - 1].textContent = compact ? ' Compact' : ' Desktop';
  }
  render();
}

window.addEventListener('DOMContentLoaded', () => {
  init();
  updateControlVisibility();
  applyResponsiveLayout();
});

window.addEventListener('resize', () => {
  applyResponsiveLayout();
});

window.addEventListener('orientationchange', () => {
  setTimeout(applyResponsiveLayout, 150);
});
</script>
